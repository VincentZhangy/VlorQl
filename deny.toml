# VlorQl dependency audit configuration.
# Run with: cargo deny check

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # opentelemetry_sdk v0.28.0 transitively depends on async-std (discontinued).
    # Upstream issue: https://github.com/open-telemetry/opentelemetry-rust/issues/2034
    "RUSTSEC-2025-0052",
]
git-fetch-with-cli = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unlicense",
    "BSL-1.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = true
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []