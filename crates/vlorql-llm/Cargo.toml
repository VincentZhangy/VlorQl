[[test]]
name = "parser_v2_expression"
path = "tests/parser_v2/expression_test.rs"

[[test]]
name = "parser_v2_pipeline"
path = "tests/parser_v2/pipeline_test.rs"

[[test]]
name = "parser_v2_validate"
path = "tests/parser_v2/validate_test.rs"

[[test]]
name = "parser_v2_fix"
path = "tests/parser_v2/fix_test.rs"

[[test]]
