[package]
name = "vlorql-llm"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Multi-provider LLM client for SQL query generation supporting Anthropic, DeepSeek, Zhipu, and local models"

[dependencies]
vlorql-core = { path = "../vlorql-core", version = "0.2.1" }
async-trait.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
tokio.workspace = true
tracing.workspace = true
bytes.workspace = true
tokio-util = { workspace = true, features = ["codec"] }
tokio-stream.workspace = true
futures.workspace = true
futures-util.workspace = true

[dev-dependencies]
mockall.workspace = true
rstest.workspace = true
mockito.workspace = true
tracing-subscriber.workspace = true

[[test]]
name = "multi_provider"
path = "tests/integration/multi_provider.rs"

[[test]]
name = "parser_v2_recover"
path = "tests/parser_v2/recover_test.rs"

[[test]]
name = "parser_v2_normalize"
